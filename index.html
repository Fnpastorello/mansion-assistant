<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mansions Assistant</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:30px;
}

h1{
    color:#d4b06a;
}

button{
    background:#7a0e0e;
    color:white;
    border:none;
    padding:12px 24px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#9c1515;
}

select{
    font-size:18px;
    padding:5px;
}

#resultado{
    margin-top:20px;
    font-size:42px;
}

#resumo{
    margin-top:20px;
    font-size:20px;
    line-height:1.8;
}

.face{
    display:inline-block;
    margin:8px;
    padding:10px;
    min-width:50px;
    border-radius:8px;
    background:#222;
}

.success{
    color:#7CFC00;
}

.clue{
    color:#FFD700;
}

.blank{
    color:#777;
}

#historico{
    max-width:600px;
    margin:20px auto;
    text-align:left;
}

.itemHistorico{
    background:#222;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<h1>Mansions Assistant</h1>

<h2>Rolador de Dados Oficial</h2>

<p>Dado d8 de Mansions of Madness 2ª Edição</p>

<select id="dados">
<option>1</option>
<option>2</option>
<option selected>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<br><br>

<button onclick="rolar()">
Rolar Dados
</button>

<button onclick="limpar()">
Limpar
</button>

<div id="resultado"></div>

<div id="resumo"></div>

<hr style="margin:30px 0;">

<h2>Últimas Rolagens</h2>

<div id="historico">
Nenhuma rolagem realizada.
</div>

<script>

const faces = [
    "success",
    "success",
    "success",
    "investigation",
    "investigation",
    "blank",
    "blank",
    "blank"
];

let historico = [];

function simbolo(face){

    switch(face){

        case "success":
            return "✓";

        case "investigation":
            return "🔍";

        default:
            return "○";
    }
}

function classe(face){

    switch(face){

        case "success":
            return "success";

        case "investigation":
            return "clue";

        default:
            return "blank";
    }
}

function atualizarHistorico(){

    const div =
        document.getElementById("historico");

    if(historico.length === 0){

        div.innerHTML =
            "Nenhuma rolagem realizada.";

        return;
    }

    div.innerHTML =
        historico.map(item =>
            `<div class="itemHistorico">${item}</div>`
        ).join("");
}

function rolar(){

    const quantidade =
        parseInt(
            document.getElementById("dados").value
        );

    let sucessos = 0;
    let investigacoes = 0;
    let falhas = 0;

    let html = "";
    let textoHistorico = [];

    for(let i=0;i<quantidade;i++){

        const resultado =
            faces[
                Math.floor(
                    Math.random()*faces.length
                )
            ];

        textoHistorico.push(
            simbolo(resultado)
        );

        if(resultado === "success")
            sucessos++;

        else if(resultado === "investigation")
            investigacoes++;

        else
            falhas++;

        html += `
            <span class="face ${classe(resultado)}">
                ${simbolo(resultado)}
            </span>
        `;
    }

    document.getElementById("resultado").innerHTML =
        html;

    document.getElementById("resumo").innerHTML =
        `
        <strong>Resultados</strong><br><br>

        ✓ Sucessos: ${sucessos}<br>

        🔍 Investigações: ${investigacoes}<br>

        ○ Em branco: ${falhas}<br><br>

        Total: ${quantidade}
        `;

    const agora =
        new Date().toLocaleTimeString();

    historico.unshift(
        `
        <strong>${agora}</strong><br>
        ${textoHistorico.join(" ")}<br>
        ✓ ${sucessos}
        |
        🔍 ${investigacoes}
        |
        ○ ${falhas}
        `
    );

    if(historico.length > 5){
        historico.pop();
    }

    atualizarHistorico();
}

function limpar(){

    document.getElementById(
        "resultado"
    ).innerHTML = "";

    document.getElementById(
        "resumo"
    ).innerHTML = "";

    historico = [];

    atualizarHistorico();
}

</script>

</body>
</html>
