<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mansions Assistant</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:30px;
}

h1{
    color:#d4b06a;
}

button{
    background:#7a0e0e;
    color:white;
    border:none;
    padding:12px 24px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#9c1515;
}

select{
    font-size:18px;
    padding:5px;
}

#resultado{
    margin-top:20px;
    font-size:42px;
}

#resumo{
    margin-top:20px;
    font-size:20px;
    line-height:1.8;
}

.face{
    display:inline-block;
    margin:8px;
    padding:10px;
    min-width:50px;
    border-radius:8px;
    background:#222;
}

.success{
    color:#7CFC00;
}

.investigation{
    color:#FFD700;
}

.blank{
    color:#777;
}

</style>
</head>

<body>

<h1>Mansions Assistant</h1>

<h2>Rolador de Dados Prof. Felipe</h2>

<p>Dado d8 de Mansions of Madness 2ª Edição</p>

<select id="dados">
<option>1</option>
<option>2</option>
<option selected>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<br><br>

<button onclick="rolar()">
Rolar Dados
</button>

<button onclick="limpar()">
Limpar
</button>

<div id="resultado"></div>

<div id="resumo"></div>

<script>

const faces = [
    "success",
    "success",
    "success",
    "investigation",
    "investigation",
    "blank",
    "blank",
    "blank"
];

function simbolo(face){

    switch(face){

        case "success":
            return "✓";

        case "investigation":
            return "🔍";

        default:
            return "○";
    }
}

function classe(face){

    switch(face){

        case "success":
            return "success";

        case "investigation":
            return "investigation";

        default:
            return "blank";
    }
}

function rolar(){

    const quantidade =
        parseInt(
            document.getElementById("dados").value
        );

    let sucessos = 0;
    let investigacoes = 0;
    let falhas = 0;

    let html = "";

    for(let i=0;i<quantidade;i++){

        const resultado =
            faces[
                Math.floor(
                    Math.random()*faces.length
                )
            ];

        if(resultado === "success")
            sucessos++;

        else if(resultado === "investigation")
            investigacoes++;

        else
            falhas++;

        html += `
            <span class="face ${classe(resultado)}">
                ${simbolo(resultado)}
            </span>
        `;
    }

    document.getElementById("resultado").innerHTML =
        html;

    document.getElementById("resumo").innerHTML =
        `
        <strong>Resultados</strong><br><br>

        ✓ Sucessos: ${sucessos}<br>

        🔍 Investigações: ${investigacoes}<br>

        ○ Em branco: ${falhas}<br><br>

        Total de dados: ${quantidade}
        `;
}

function limpar(){

    document.getElementById("resultado").innerHTML = "";

    document.getElementById("resumo").innerHTML = "";
}

</script>

</body>
</html>
